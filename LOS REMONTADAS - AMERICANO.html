.partner-tags { display: flex; flex-wrap: wrap; gap: 3px; }
.partner-tag { font-size: 9px; font-weight: 700; color: rgba(248,248,245,0.35); background: rgba(248,248,245,0.06); border-radius: 4px; padding: 2px 6px; letter-spacing: 0.3px; }
</style>

<div class="app" id="app"></div>

<script>
const TOTAL_ROUNDS = 11;
const MATCH_SECS = 7 * 60;
const N = 12;

let state = {
  page: 'setup',
  players: Array.from({length: N}, (_,i) => `Joueur ${i+1}`),
  schedule: null,
  scores: {},
  viewRound: 0,
  timer: MATCH_SECS,
  timerOn: false,
  timerRef: null,
};

// ── Algorithme de rotation ──────────────────────────────────────────────────
// Génère 11 manches × 3 matchs (6 équipes de 2)
// Objectif : maximiser la variété de partenaires et d'adversaires

function buildSchedule(players) {
  // Représente les paires jouées ensemble et en face
  const partnerCount = {}; // p1_p2 -> nb fois partenaires
  const oppCount = {};     // p1_p2 -> nb fois adversaires

  const key = (a, b) => [a,b].sort().join('|');
  const pc = (a,b) => { const k=key(a,b); partnerCount[k]=(partnerCount[k]||0)+1; };
  const oc = (a,b) => { const k=key(a,b); oppCount[k]=(oppCount[k]||0)+1; };
  const getPc = (a,b) => partnerCount[key(a,b)]||0;
  const getOc = (a,b) => oppCount[key(a,b)]||0;

  function scorePairing(t1, t2) {
    // Pénalise les binômes déjà vus, récompense les adversaires pas encore joués
    let s = 0;
    s -= getPc(t1[0],t1[1]) * 4;
    s -= getPc(t2[0],t2[1]) * 4;
    s -= getOc(t1[0],t2[0]) * 1;
    s -= getOc(t1[0],t2[1]) * 1;
    s -= getOc(t1[1],t2[0]) * 1;
    s -= getOc(t1[1],t2[1]) * 1;
    return s;
  }

  function shuffle(arr) {
    const a = [...arr];
    for (let i=a.length-1;i>0;i--) { const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
    return a;
  }

  function bestRound() {
    let best = null, bestScore = -Infinity;
    for (let attempt=0; attempt<300; attempt++) {
      const s = shuffle(players);
      const matches = [
        {t1:[s[0],s[1]],t2:[s[2],s[3]]},
        {t1:[s[4],s[5]],t2:[s[6],s[7]]},
        {t1:[s[8],s[9]],t2:[s[10],s[11]]}
      ];
      const score = matches.reduce((acc,m) => acc + scorePairing(m.t1,m.t2), 0);
      if (score > bestScore) { bestScore = score; best = matches; }
    }
    return best;
  }

  const rounds = [];
  for (let r=0; r<TOTAL_ROUNDS; r++) {
    const round = bestRound();
    round.forEach(m => {
      pc(m.t1[0],m.t1[1]); pc(m.t2[0],m.t2[1]);
      oc(m.t1[0],m.t2[0]); oc(m.t1[0],m.t2[1]);
      oc(m.t1[1],m.t2[0]); oc(m.t1[1],m.t2[1]);
    });
    rounds.push(round);
  }
  return rounds;
}

// ── Scores & classement ─────────────────────────────────────────────────────
function getKey(r,c) { return `r${r}c${c}`; }

function getRanking() {
  const stats = {};
  state.players.forEach(p => stats[p] = {pts:0, diff:0, played:0});
  state.schedule.forEach((round, ri) => {
    round.forEach((match, ci) => {
      const sc = state.scores[getKey(ri,ci)];
      if (!sc || sc[0]==='' || sc[1]==='') return;
      const s1=parseInt(sc[0])||0, s2=parseInt(sc[1])||0;
      match.t1.forEach(p => {
        stats[p].played++; stats[p].diff += (s1-s2);
        if (s1>s2) stats[p].pts+=3; else if (s1===s2) stats[p].pts+=1;
      });
      match.t2.forEach(p => {
        stats[p].played++; stats[p].diff += (s2-s1);
        if (s2>s1) stats[p].pts+=3; else if (s1===s2) stats[p].pts+=1;
      });
    });
  });
  return Object.entries(stats).map(([name,s])=>({name,...s}))
    .sort((a,b)=>b.pts-a.pts||b.diff-a.diff);
}

function getPartnerStats() {
  const map = {};
  state.players.forEach(p => map[p] = new Set());
  state.schedule.forEach(round => {
    round.forEach(match => {
      map[match.t1[0]].add(match.t1[1]); map[match.t1[1]].add(match.t1[0]);
      map[match.t2[0]].add(match.t2[1]); map[match.t2[1]].add(match.t2[0]);
    });
  });
  return map;
}

function formatTime(s) {
  return `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`;
}

// ── Render ──────────────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');

  const header = `
    <div class="logo-header">
      <div class="logo-los">Los</div>
      <div class="logo-main">Remontadas</div>
      <div class="logo-line"></div>
      <div class="logo-sub">Padel Event</div>
    </div>`;

  if (state.page === 'setup') {
    const inputs = state.players.map((p,i) => `
      <div class="player-input-wrap">
        <span class="player-num">${i+1}</span>
        <input class="player-input" type="text" value="${p}" placeholder="Joueur ${i+1}"
          onchange="state.players[${i}]=this.value.trim()||'Joueur ${i+1}'" />
      </div>`).join('');

    app.innerHTML = header + `
      <div class="section-label">12 joueurs</div>
      <div class="player-grid">${inputs}</div>
      <button class="btn btn-primary" onclick="launch()">Générer les 11 manches</button>`;
    return;
  }

  const nav = `
    <div class="nav">
      <button class="nav-btn ${state.page==='matchs'?'active':''}" onclick="state.page='matchs';render()">Matchs</button>
      <button class="nav-btn ${state.page==='timer'?'active':''}" onclick="state.page='timer';render()">Timer</button>
      <button class="nav-btn ${state.page==='rank'?'active':''}" onclick="state.page='rank';render()">Classement</button>
      <button class="nav-btn ${state.page==='stats'?'active':''}" onclick="state.page='stats';render()">Binômes</button>
    </div>`;

  // ── MATCHS ────────────────────────────────────────────────────────────────
  if (state.page === 'matchs') {
    const r = state.viewRound;
    const round = state.schedule[r];
    const courts = round.map((match, ci) => {
      const key = getKey(r,ci);
      const sc = state.scores[key]||['',''];
      return `
        <div class="court-card">
          <div class="court-label">Terrain ${ci+1}</div>
          <div class="match-row">
            <div class="team">
              <div class="pname">${match.t1[0]}</div>
              <div class="pname">${match.t1[1]}</div>
            </div>
            <div class="vs-badge">VS</div>
            <div class="team right">
              <div class="pname">${match.t2[0]}</div>
              <div class="pname">${match.t2[1]}</div>
            </div>
          </div>
          <div class="score-row">
            <input type="number" class="score-inp" min="0" max="99" value="${sc[0]}"
              oninput="setScore(${r},${ci},0,this.value);renderRanking()">
            <div class="score-sep">—</div>
            <input type="number" class="score-inp" min="0" max="99" value="${sc[1]}"
              oninput="setScore(${r},${ci},1,this.value);renderRanking()">
          </div>
        </div>`;
    }).join('');

    app.innerHTML = header + nav + `
      <div class="manche-nav">
        <div class="round-pill">Manche ${r+1} / ${TOTAL_ROUNDS}</div>
        <div class="manche-arrows">
          <button class="arr-btn" onclick="state.viewRound--;render()" ${r===0?'disabled':''}>‹</button>
          <button class="arr-btn" onclick="state.viewRound++;render()" ${r===TOTAL_ROUNDS-1?'disabled':''}>›</button>
        </div>
      </div>
      ${courts}`;
    return;
  }

  // ── TIMER ─────────────────────────────────────────────────────────────────
  if (state.page === 'timer') {
    const pct = (state.timer / MATCH_SECS) * 100;
    const urgent = state.timer <= 60;
    const done = state.timer === 0;
    app.innerHTML = header + nav + `
      <div class="timer-wrap">
        <div class="timer-num ${urgent?'urgent':''}">${formatTime(state.timer)}</div>
        <div class="timer-sub">${done ? 'Temps écoulé !' : 'durée du match'}</div>
        <div class="timer-prog"><div class="timer-fill" style="width:${pct}%"></div></div>
      </div>
      <div class="timer-btns">
        ${state.timerOn
          ? `<button class="btn" onclick="stopTimer()">Pause</button>`
          : `<button class="btn btn-primary" onclick="startTimer()" ${done?'disabled':''}>
              ${state.timer===MATCH_SECS?'Démarrer':'Reprendre'}
            </button>`
        }
        <button class="btn" onclick="resetTimer()">Reset</button>
      </div>`;
    return;
  }

  // ── CLASSEMENT ────────────────────────────────────────────────────────────
  if (state.page === 'rank') {
    const ranking = getRanking();
    const hasData = ranking.some(r=>r.played>0);
    const rows = hasData ? ranking.map((r,i) => `
      <div class="rank-row">
        <div class="rank-bar ${i===0&&r.pts>0?'first':''}"></div>
        <div class="rank-pos ${i===0&&r.pts>0?'first':''}">${i+1}</div>
        <div class="rank-name">${r.name}</div>
        <div>
          <div class="rank-pts">${r.pts}</div>
          <div class="rank-diff">${r.diff>=0?'+':''}${r.diff}</div>
        </div>
      </div>`).join('')
      : `<div class="notif">Entrez des scores dans l'onglet Matchs</div>`;

    app.innerHTML = header + nav + `
      <div class="section-label">Classement général</div>
      ${rows}`;
    return;
  }

  // ── BINÔMES ───────────────────────────────────────────────────────────────
  if (state.page === 'stats') {
    const pmap = getPartnerStats();
    const cells = state.players.map(p => {
      const partners = [...pmap[p]];
      const tags = partners.map(q=>`<span class="partner-tag">${q}</span>`).join('');
      return `
        <div class="partner-cell">
          <div class="partner-cell-name">${p}</div>
          <div class="partner-tags">${tags||'<span class="partner-tag">—</span>'}</div>
        </div>`;
    }).join('');

    app.innerHTML = header + nav + `
      <div class="section-label">Partenaires sur les 11 manches</div>
      <div class="partner-grid">${cells}</div>`;
    return;
  }
}

function renderRanking() {
  // Mise à jour silencieuse des scores sans re-render complet
}

function setScore(r,c,t,val) {
  const k = getKey(r,c);
  if (!state.scores[k]) state.scores[k]=['',''];
  state.scores[k][t] = val;
}

function launch() {
  // Lire les noms depuis les inputs
  document.querySelectorAll('.player-input').forEach((el,i)=>{
    state.players[i] = el.value.trim() || `Joueur ${i+1}`;
  });
  state.schedule = buildSchedule(state.players);
  state.viewRound = 0;
  state.page = 'matchs';
  render();
}

function startTimer() {
  if (state.timerOn) return;
  state.timerOn = true;
  state.timerRef = setInterval(()=>{
    if (state.timer > 0) { state.timer--; render(); }
    else { clearInterval(state.timerRef); state.timerOn=false; render(); }
  },1000);
}

function stopTimer() { clearInterval(state.timerRef); state.timerOn=false; render(); }
function resetTimer() { stopTimer(); state.timer=MATCH_SECS; render(); }

render();
</script>
